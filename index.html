<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VS MUSIC</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    body {
      margin:0;
      background:#121212;
      color:white;
      font-family:Arial;
      display:flex;
    }

    /* SIDEBAR */
    .sidebar {
      width:200px;
      background:#000;
      height:100vh;
      padding:20px;
      position:fixed;
    }

    .sidebar a {
      display:block;
      margin:10px 0;
      color:white;
      text-decoration:none;
    }

    /* MAIN */
    .main {
      margin-left:220px;
      padding:20px;
      width:100%;
    }

    .card-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:15px;
    }

    .card {
      background:#181818;
      padding:10px;
      border-radius:10px;
      cursor:pointer;
    }

    .card img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:8px;
    }

    /* PLAYER */
    .player {
      position:fixed;
      bottom:0;
      left:200px;
      right:0;
      background:black;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>🎧 VS MUSIC</h3>

  <a href="#">🏠 Home</a>
  <a href="#">🔍 Search</a>
  <a href="#">📚 Library</a>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <h2>Trending Songs</h2>
  <div id="trendingSongs" class="card-grid"></div>

</div>

<!-- PLAYER -->
<div class="player">

  <div>
    <img id="playerImg" src="" width="50">
    <div id="playerTitle">No Song</div>
    <div id="playerArtist">---</div>
  </div>

  <div>
    <button id="prevBtn">⏮</button>
    <button id="playPauseBtn">▶</button>
    <button id="nextBtn">⏭</button>
  </div>

  <input type="range" id="progressBar">
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01">

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
